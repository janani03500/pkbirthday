<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- ✅ MOBILE FIX -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Prathish Kumar 🎉</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 🎬 START OVERLAY -->
  <div id="start-overlay">
    <h1>🎉 Tap to Start 🎂</h1>
  </div>

  <!-- ⏳ COUNTDOWN -->
  <div id="countdown">
    <span id="timer">10</span>
  </div>

  <!-- 🎉 WISH SECTION -->
  <div id="wish" style="display:none;">
    <h1 id="wish-text">🎉 Happy Birthday PK 🎉</h1>
    <button id="btn-card">🎂 Open Card</button>
  </div>

  <!-- 🎆 FIREWORKS -->
  <canvas id="fireworks-canvas"></canvas>

  <!-- 🎧 AUDIO (🔥 VERY IMPORTANT FIX) -->
  <audio id="music" loop playsinline preload="auto">
    <source src="birthday-song.mp3" type="audio/mpeg">
  </audio>

  <audio id="boomSound" playsinline preload="auto">
    <source src="boom.mp3" type="audio/mpeg">
  </audio>

  <script src="script.js"></script>

</body>
</html>
