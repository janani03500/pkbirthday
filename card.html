<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- ✅ PERFECT MOBILE FIX -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <title>Birthday Card 🎂</title>
  <link rel="stylesheet" href="card.css">
</head>

<body>

  <!-- 🎧 BACKGROUND MUSIC -->
  <audio id="card-music" src="card-music.mp3" loop></audio>

  <!-- 🔊 OPEN SOUND -->
  <audio id="open-sound" src="open.mp3"></audio>

  <!-- 💌 CARD SCENE -->
  <div class="card-scene" id="cardScene">

    <!-- ✉️ ENVELOPE WRAPPER -->
    <div class="envelope" id="envelope">

      <!-- 🔺 FLAP -->
      <div class="flap"></div>

      <!-- 💌 CARD -->
      <div class="card" id="card">

        <!-- FRONT -->
        <div class="card-face card-front">
          <h1>🎉 Happy Birthday 🎉</h1>
          <p>Tap to open 💖</p>
          <img src="tom-jerry-front.png" class="card-img">
        </div>

        <!-- BACK -->
        <div class="card-face card-back">
          <h2>💌 From Jerry to Tom</h2>
          <img src="tom-jerry-inside.png" class="card-img">
        </div>

      </div>
    </div>

  </div>


  <!-- 🎉 SECOND SCREEN -->
  <div class="second-card" id="secondCard">
    <img src="tom-jerry-inside.png" class="card-img">
    <h2>✨ Our Beautiful Memories 💖</h2>
  </div>


  <!-- 📸 PHOTO SECTION -->
  <div class="photo-section" id="photo-section">

    <div class="photo-slider" id="slider">

      <div class="photo-box">
        <img src="pk1.jpg" class="photo active">
        <div class="heart">❤️</div>
      </div>

      <div class="photo-box">
        <img src="pk2.jpg" class="photo">
        <div class="heart">❤️</div>
      </div>

      <div class="photo-box">
        <img src="pk3.jpg" class="photo">
        <div class="heart">❤️</div>
      </div>

      <div class="photo-box">
        <img src="pk4.jpg" class="photo">
        <div class="heart">❤️</div>
      </div>

      <div class="photo-box">
        <img src="pk5.jpg" class="photo">
        <div class="heart">❤️</div>
      </div>

      <div class="photo-box">
        <img src="pk6.jpg" class="photo">
        <div class="heart">❤️</div>
      </div>

      <div class="photo-box">
        <img src="pk7.jpg" class="photo">
        <div class="heart">❤️</div>
      </div>

    </div>

    <!-- 🎮 CONTROLS -->
    <div class="controls">
      <button onclick="prevPhoto()">⏮</button>
      <button onclick="toggleSlider()" id="playBtn">⏸</button>
      <button onclick="nextPhoto()">⏭</button>
    </div>

  </div>


  <!-- 💖 FLOATING HEARTS CONTAINER -->
  <div id="floating-hearts"></div>

  <!-- ✨ GLITTER -->
  <div class="glitter"></div>

  <!-- 🚀 SCRIPT -->
  <script src="card.js"></script>

</body>
</html>
