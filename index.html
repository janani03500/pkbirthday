<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prathish Kumar🎉</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Start Overlay -->
  <div id="start-overlay" onclick="startApp()">
    <h1>Tap to Start 🎂</h1>
  </div>

  <!-- Countdown -->
  <div id="countdown">
    <span id="timer">10</span>
  </div>

  <!-- Wish Section -->
  <div id="wish">
    <h1 id="wish-text"></h1>
    <button id="btn-card">🎂 Open Card</button>
  </div>

  <!-- Fireworks Canvas -->
  <canvas id="fireworks-canvas"></canvas>

  <!-- Background Music -->
  <audio id="music" src="birthday-song.mp3" loop></audio>
  <audio id="boomSound" src="boom.mp3"></audio>

  <script src="script.js"></script>
</body>
</html>
